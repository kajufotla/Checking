<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PDF Compressor</title>
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF-lib for client-side PDF manipulation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Premium Glassmorphism & Custom Styles */
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .upload-zone {
            transition: all 0.3s ease;
            border: 2px dashed #cbd5e1;
        }
        .upload-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-2xl rounded-2xl p-8 text-center">
        <!-- Header -->
        <h1 class="text-3xl font-bold text-gray-800 mb-2">PDF Compressor</h1>
        <p class="text-gray-500 mb-8">Reduce PDF file size offline. 100% secure, no server uploads.</p>

        <!-- Upload Zone -->
        <div id="drop-zone" class="upload-zone rounded-xl p-10 cursor-pointer mb-6 relative">
            <input type="file" id="file-input" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <div class="text-blue-500 text-5xl mb-4">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-700">Choose or drop PDF here</h3>
            <p class="text-sm text-gray-400 mt-2">Maximum privacy. Processing happens on your device.</p>
        </div>

        <!-- File Info & Compression Settings (Hidden by default) -->
        <div id="processing-area" class="hidden text-left bg-gray-50 rounded-xl p-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h4 id="file-name" class="font-semibold text-gray-800 truncate max-w-[250px]">filename.pdf</h4>
                    <p id="file-size" class="text-sm text-gray-500">0 MB</p>
                </div>
                <button id="compress-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition shadow-lg shadow-blue-500/30">
                    Compress PDF
                </button>
            </div>

            <!-- Progress Bar -->
            <div id="progress-container" class="hidden mt-4">
                <div class="flex justify-between text-sm mb-1 text-gray-600">
                    <span>Compressing...</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Result Area (Hidden by default) -->
        <div id="result-area" class="hidden mt-6 bg-green-50 rounded-xl p-6 border border-green-100">
            <h3 class="text-green-700 font-bold text-lg mb-2"><i class="fa-solid fa-circle-check"></i> Compression Complete!</h3>
            <p class="text-green-600 text-sm mb-4">New Size: <span id="new-size" class="font-semibold">0 MB</span></p>
            <a id="download-btn" class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition shadow-lg shadow-green-500/30">
                <i class="fa-solid fa-download mr-2"></i> Download Compressed PDF
            </a>
            <button id="reset-btn" class="ml-4 text-gray-500 hover:text-gray-700 text-sm font-medium underline">
                Compress Another
            </button>
        </div>
    </div>

    <!-- Main Logic Script -->
    <script src="script.js"></script>
</body>
</html>
