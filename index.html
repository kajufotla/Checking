<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Toolkit | 50 Advanced Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-bg text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            PDF Expert & Toolkit
        </div>
        <nav>
            <ul class="flex space-x-6 text-sm font-medium">
                <li><a href="/" class="hover:text-blue-400 transition">Home</a></li>
                <li><a href="/tools" class="hover:text-blue-400 transition">All Tools</a></li>
                <li><a href="/contact" class="hover:text-blue-400 transition">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Ultimate Advanced Toolkit</h1>
            <p class="text-lg text-gray-400 max-w-2xl mx-auto">100% secure, fast, and entirely client-side. No files are uploaded to any server.</p>
        </div>

        <!-- Dynamic Tools Grid (Populated by JS) -->
        <div id="tools-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Cards will be injected here via script.js -->
        </div>
        
        <!-- Processing Workspace (Hidden by default, shown when a tool is clicked) -->
        <div id="workspace" class="hidden mt-12 glass-panel p-8 rounded-2xl relative">
            <button id="close-workspace" class="absolute top-4 right-4 text-gray-400 hover:text-white">&times; Close</button>
            <h2 id="workspace-title" class="text-3xl font-bold mb-6">Tool Name</h2>
            <div id="workspace-controls" class="space-y-4">
                <!-- Inputs and controls injected dynamically -->
            </div>
            
            <!-- Enterprise Progress Bar & ETA -->
            <div id="progress-container" class="hidden mt-6">
                <div class="flex justify-between text-sm mb-2 text-gray-300">
                    <span id="progress-text">Processing...</span>
                    <span id="eta-text">ETA: Calculating...</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="mt-8 flex space-x-4">
                <button id="start-btn" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition shadow-lg shadow-blue-500/30">Start Processing</button>
                <button id="cancel-btn" class="hidden px-6 py-3 bg-red-600 hover:bg-red-700 rounded-lg font-semibold transition shadow-lg shadow-red-500/30">Cancel</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="glass-footer py-8 mt-auto border-t border-gray-800">
        <div class="container mx-auto px-4 text-center text-sm text-gray-500">
            <p>&copy; 2026 PDF Expert & Toolkit. All rights reserved.</p>
            <div class="mt-2 space-x-4">
                <a href="/terms" class="hover:text-gray-300 transition">Terms of Service</a>
                <a href="/about" class="hover:text-gray-300 transition">About Us</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
